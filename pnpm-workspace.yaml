packages:
    - ./packages/*
    - ./tests/*
    - ./examples/*

autoInstallPeers: false
strictPeerDependencies: false

allowBuilds:
    esbuild: false

catalogs:
    dep:
        "@standard-schema/spec": ^1.0.0
    dev:
        hono: 4.5.0
        valibot: 1.1.0
        zod: 3.25.6
    peer:
        "@jderstd/hono": ~0.8.0
        hono: ^4.5.0
        zod: ^3.25.6 || ^4.0.0
    test:
        vitest: ^4.1
    example:
        "@types/node": ^25.9.0
        "@hono/node-server": ^2.0.3
        "@hono/vite-dev-server": ~0.25.3
        "@hono/vite-build": ^1.11.1
        "vite": ^8.0.13
        "vite-tsconfig-paths": ^6.1.1

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
    - "@apst/biome"
    - "@apst/tsconfig"
    - "@apst/tsdown"
    - "@jderstd/core"
    - "ts-vista"
